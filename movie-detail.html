<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Details — MovieStream</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Video.js for HLS playback -->
  <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
</head>
<body>
  <header class="header">
    <div class="container header-container">
      <a href="index.html" class="logo">MovieStream</a>
      <div class="search-wrapper">
        <input type="text" id="search-input" class="search-input" placeholder="Search movies...">
        <button id="search-btn" class="search-btn"><i class="fas fa-search"></i></button>
      </div>
    </div>
  </header>

  <main class="main container">
    <div id="movie-detail" class="movie-detail">
      <!-- Dynamically populated -->
    </div>

    <!-- Recommendations -->
    <section class="section">
      <h2>You May Also Like</h2>
      <div id="recommendations-container" class="movie-grid"></div>
      <div id="recommendations-loader" class="loader" style="display: none;"></div>
      <div id="recommendations-error" class="error-message" style="display: none;"></div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>Movie data provided by <a href="https://www.themoviedb.org/" target="_blank">TMDB</a>. Streams via VidLink.pro.</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/detail.js"></script>
</body>
</html>

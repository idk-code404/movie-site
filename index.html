<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieStream — Minimal Dark</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Font Awesome for icons (optional) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <header class="header">
    <div class="container header-container">
      <a href="index.html" class="logo">MovieStream</a>
      <div class="search-wrapper">
        <input type="text" id="search-input" class="search-input" placeholder="Search movies...">
        <button id="search-btn" class="search-btn"><i class="fas fa-search"></i></button>
      </div>
    </div>
  </header>

  <main class="main container">
    <!-- Filter Bar -->
    <div class="filter-bar">
      <div class="filter-group">
        <select id="genre-filter" class="filter-select">
          <option value="">All Genres</option>
          <!-- Populated by JavaScript -->
        </select>
      </div>
      <div class="filter-group">
        <select id="year-filter" class="filter-select">
          <option value="">All Years</option>
          <!-- Populated by JavaScript -->
        </select>
      </div>
      <div class="filter-group">
        <select id="rating-filter" class="filter-select">
          <option value="">Any Rating</option>
          <option value="5">5+</option>
          <option value="6">6+</option>
          <option value="7">7+</option>
          <option value="8">8+</option>
        </select>
      </div>
      <button id="apply-filters" class="btn btn-outline">Apply Filters</button>
    </div>

    <!-- Trending Section -->
    <section class="section">
      <div class="section-header">
        <h2>Trending This Week</h2>
        <a href="#" id="view-all-trending" class="section-link">View All <i class="fas fa-arrow-right"></i></a>
      </div>
      <div id="trending-container" class="movie-grid"></div>
      <div id="trending-loader" class="loader" style="display: none;"></div>
      <div id="trending-error" class="error-message" style="display: none;"></div>
    </section>

    <!-- Discover Section (with filters) -->
    <section class="section">
      <div class="section-header">
        <h2>Discover Movies</h2>
        <span id="result-count" class="result-count"></span>
      </div>
      <div id="movie-container" class="movie-grid"></div>
      <div id="loader" class="loader" style="display: none;"></div>
      <div id="error" class="error-message" style="display: none;"></div>
      <div class="load-more-container">
        <button id="load-more" class="btn btn-primary" style="display: none;">Load More</button>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>Movie data provided by <a href="https://www.themoviedb.org/" target="_blank">TMDB</a>. Streams via VidLink.pro.</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
